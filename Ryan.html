<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card - Anitha</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f3f3f3;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    /* CARD LAYOUT */
    .card {
        width: 100%;
        max-width: 360px;
        background: white;
        border-radius: 14px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
        overflow: hidden;
        margin-bottom: 25px;
    }

    /* FRONT STYLING */
    .front {
        padding: 20px;
    }

    .profile-img {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        object-fit: cover;
        margin: auto;
        display: block;
    }

    .name {
        text-align: center;
        font-size: clamp(18px, 6vw, 26px);
        font-weight: bold;
        margin-top: 12px;
    }

    .designation {
        text-align: center;
        font-size: clamp(13px, 4vw, 17px);
        margin-top: 4px;
        font-weight: normal;
    }

    .details {
        margin-top: 18px;
        font-size: clamp(12px, 3.8vw, 16px);
    }

    .details p {
        margin: 6px 0;
    }

    .link {
        color: black !important;
        font-weight: normal;
        text-decoration: none;
        word-break: break-word;
    }

    /* BACK SIDE */
    .backside {
        padding: 20px;
        background: white;
    }

    .back-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
    }

    .brand-box {
        flex: 1;
        text-align: center;
    }

    .brand-logo {
        width: 100%;
        max-width: 120px;
        height: auto;
        object-fit: contain;
        margin-bottom: 6px;
    }

    .brand-link {
        text-decoration: none;
        color: black;
        font-size: clamp(10px, 2.8vw, 15px);
        word-break: break-word;
    }
</style>
</head>
<body>

<!-- FRONT SIDE -->
<div class="card">
    <div class="front">
        <img src="Anitha.png" class="profile-img">

        <div class="name">Anitha</div>
        <div class="designation">Business Development Executive</div>

        <div class="details">
            <p><strong>Phone:</strong> <a class="link" href="tel:+91 0000000000">+91 00000 00000</a></p>
            <p><strong>Email:</strong> <a class="link" href="mailto:anitha@gmail.com">anitha@gmail.com</a></p>
            <p><strong>Website:</strong> <a class="link" href="https://www.grssl.com">www.grssl.com</a></p>
        </div>
    </div>
</div>

<!-- BACK SIDE -->
<div class="card">
    <div class="backside">
        <div class="back-container">

            <!-- INIKA LEFT -->
            <div class="brand-box">
                <img src="Inika.png" class="brand-logo">
                <a href="https://www.inikaresorts.com" class="brand-link">www.inikaresorts.com</a>
            </div>

            <!-- DALFIN RIGHT -->
            <div class="brand-box">
                <img src="Dalfin pic.png" class="brand-logo">
                <a href="https://www.grssl.com/products" class="brand-link">www.grssl.com/products</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
